apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
        - name: kafka-consumer
          image: laxmansuthardev/chatbot-web:latest  # same image as web
          command: ["python", "knowledge_base/kafka_consumer.py"]
          envFrom:
            - secretRef:
                name: chatbot-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
