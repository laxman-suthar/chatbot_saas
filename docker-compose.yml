version: '3.9'

services:

  # ─── PostgreSQL ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: chatbot_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s  # ← add this line

  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ChromaDB ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0    # ← upgrade version
    container_name: chatbot_chroma
    restart: always
    volumes:
      - chroma_data:/data
    ports:
      - "8001:8000"
    environment:
      - ALLOW_RESET=true
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1 || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s

  # ─── Django App ──────────────────────────────────
  web:
    build: .
    container_name: chatbot_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 chatbot.asgi:application"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
      - chroma_local:/app/chroma_db
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  # ─── Celery Worker ───────────────────────────────
  celery:
    build: .
    container_name: chatbot_celery
    restart: always
    command: celery -A chatbot worker -l info --concurrency=4
    volumes:
      - .:/app
      - media_data:/app/media
      - chroma_local:/app/chroma_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat (periodic tasks) ────────────────
  celery_beat:
    build: .
    container_name: chatbot_celery_beat
    restart: always
    command: celery -A chatbot beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chatbot_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  chroma_data:
  chroma_local:
  media_data:
  static_data: