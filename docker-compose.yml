version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: chatbot_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chatbot-network

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - chatbot-network

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: chatbot_chroma
    restart: always
    volumes:
      - chroma_data:/data
    ports:
      - "8001:8000"
    networks:
      - chatbot-network

  web:
    build: .
    container_name: chatbot_web
    restart: always
    command: >
      sh -c "python manage.py makemigrations &&
         python manage.py migrate &&
         python manage.py collectstatic --noinput &&
         daphne -b 0.0.0.0 -p 8000 chatbot.asgi:application"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chatbot-network

  # ✅ KAFKA IN KRAFT MODE 
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: chatbot_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # This is your unique Cluster ID
      CLUSTER_ID: 'Mk3OEYBSD34fcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 --version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - chatbot-network

  # ✅ KAFKA INIT (Creates the topic automatically)
  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: chatbot_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "
        kafka-topics.sh --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic document-upload \
        --partitions 1 \
        --replication-factor 1 && \
        echo 'Topic document-upload created'
      "
    networks:
      - chatbot-network

  # ✅ KAFKA CONSUMER
  kafka-consumer:
    build: .
    container_name: chatbot_kafka_consumer
    restart: always
    working_dir: /app
    command: python knowledge_base/kafka_consumer.py
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      # Matches the service name 'kafka' defined above
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_DOCUMENT_UPLOAD_TOPIC: document-upload
      KAFKA_CONSUMER_GROUP: doc-processors
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - chatbot-network

  nginx:
    image: nginx:alpine
    container_name: chatbot_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/staticfiles:ro # Give Nginx access to the same folder

    depends_on:
      - web
    networks:
      - chatbot-network

volumes:
  postgres_data:
  chroma_data:
  media_data:
  static_data:
  kafka_data:

networks:
  chatbot-network:
    driver: bridge
